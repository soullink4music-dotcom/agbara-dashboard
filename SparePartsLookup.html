var DB=RAW;
var curTab="search",timer=null,lastRes=[];

document.getElementById("sinput").addEventListener("input",onInput);

function setTab(t){
  curTab=t;
  document.querySelectorAll(".tab").forEach(function(el){el.classList.remove("on");});
  document.getElementById("tab-"+t).classList.add("on");
  document.getElementById("swrap").style.display=t==="search"?"block":"none";
  clearSearch();
  if(t==="multi") showMulti(); else showEmpty();
}

function onInput(){
  var v=document.getElementById("sinput").value.trim();
  document.getElementById("xbtn").style.display=v?"block":"none";
  document.getElementById("sico").style.display=v?"none":"block";
  clearTimeout(timer);
  if(!v){showEmpty();return;}
  timer=setTimeout(function(){doSearch(v);},200);
}

function clearSearch(){
  document.getElementById("sinput").value="";
  document.getElementById("xbtn").style.display="none";
  document.getElementById("sico").style.display="block";
  if(curTab==="search") showEmpty();
}

function doSearch(q){
  var u=q.toUpperCase().trim();
  var ex=DB.filter(function(r){return r[0]===u;});
  var res;
  if(ex.length){res=ex;}
  else{
    var byN=DB.filter(function(r){return r[0].indexOf(u)!==-1;});
    var byD=DB.filter(function(r){return r[1].toUpperCase().indexOf(u)!==-1&&r[0].indexOf(u)===-1;});
    res=byN.concat(byD);
  }
  lastRes=res;
  renderResults(res,q);
}

function renderResults(res,q){
  var u=q.toUpperCase();
  document.getElementById("stext").innerHTML="<span class=\"rc\">"+res.length+"</span> result"+(res.length!==1?"s":"")+" for <strong>"+esc(q)+"</strong>";
  if(!res.length){
    document.getElementById("main").innerHTML="<div class=\"empty\"><div class=\"eico\">&#128270;</div><div class=\"etitle\">No results</div><div class=\"esub\">Try a different keyword or item number format (e.g. P013494)</div></div>";
    return;
  }
  var html=res.map(function(r,i){
    var parts=r[1].split(";");
    var dh="<span class=\"dtype\">"+hl(parts[0],u)+"</span>"+(parts.length>1?"; "+hl(parts.slice(1).join(";"),u):"");
    var loc=r[2]||"";
    var lh=loc?"<span class=\"lval\">"+esc(loc)+"</span>":"<span class=\"lval none\">No location</span>";
    return "<div class=\"card\">"
      +"<div class=\"chead\"><span class=\"ino\">"+hl(r[0],u)+"</span>"
      +"<button class=\"cbtn\" data-i=\""+i+"\" onclick=\"cp(this)\">&#10697;</button></div>"
      +"<div class=\"desc\">"+dh+"</div>"
      +"<div class=\"lrow\"><span class=\"llbl\">Location</span>"+lh+"</div>"
      +"</div>";
  }).join("");
  document.getElementById("main").innerHTML="<div class=\"rlist\">"+html+"</div>";
}

function cp(btn){
  var r=lastRes[parseInt(btn.getAttribute("data-i"))];
  navigator.clipboard.writeText(r[0]+" | "+r[1]+" | "+(r[2]||"No location"))
    .then(function(){showToast("Copied!");})
    .catch(function(){showToast("Copy failed");});
}

function showMulti(){
  document.getElementById("sbar").style.display="none";
  document.getElementById("main").innerHTML=
    "<textarea class=\"mtxt\" id=\"mtxt\" placeholder=\"Paste item numbers, one per line\"></textarea>"
    +"<button class=\"mbtn\" onclick=\"doMulti()\">Look Up All Items</button>"
    +"<div class=\"mhint\">Paste up to 200 item numbers at once</div>"
    +"<div id=\"mres\"></div>";
}

function doMulti(){
  var raw=document.getElementById("mtxt").value;
  var seen={},items=[];
  raw.split(/[\n\r,\s]+/).forEach(function(s){
    var t=s.trim().toUpperCase();
    if(/^P[0-9]+$/.test(t)&&!seen[t]){seen[t]=true;items.push(t);}
  });
  if(!items.length){showToast("No valid item numbers found");return;}
  var rows=items.map(function(item,i){
    var f=null;
    for(var k=0;k<DB.length;k++){if(DB[k][0]===item){f=DB[k];break;}}
    var d=f?esc(f[1]):"&mdash; NOT FOUND &mdash;";
    var l=f&&f[2]?esc(f[2]):"&mdash;";
    return "<tr class=\""+(!f?"nf":"")+"\">"
      +"<td style=\"text-align:center;color:var(--muted);font-size:11px\">"+(i+1)+"</td>"
      +"<td class=\"tdi\">"+esc(item)+"</td><td>"+d+"</td><td class=\"tdl\">"+l+"</td></tr>";
  }).join("");
  var found=items.filter(function(it){return DB.some(function(r){return r[0]===it;});}).length;
  document.getElementById("sbar").style.display="flex";
  document.getElementById("stext").innerHTML="<span class=\"rc\">"+found+"</span> of <strong>"+items.length+"</strong> items found";
  document.getElementById("mres").innerHTML=
    "<div style=\"overflow-x:auto\"><table class=\"rtbl\"><thead><tr>"
    +"<th>#</th><th>Item No</th><th>Description</th><th>Location</th>"
    +"</tr></thead><tbody>"+rows+"</tbody></table></div>";
}

function showEmpty(){
  document.getElementById("sbar").style.display="flex";
  document.getElementById("stext").innerHTML="Search by item number or keyword";
  document.getElementById("main").innerHTML=
    "<div class=\"empty\">"
    +"<div class=\"eico\">&#128299;</div>"
    +"<div class=\"etitle\">Find any spare part</div>"
    +"<div class=\"esub\">Type an item number like <strong>P013494</strong><br>or a keyword like <strong>bearing</strong>, <strong>belt</strong></div>"
    +"</div>";
}

function hl(text,q){
  if(!q||q.length<2) return esc(text);
  var re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi");
  return esc(text).replace(re,function(m){return "<mark>"+m+"</mark>";});
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2000);}
</script>
